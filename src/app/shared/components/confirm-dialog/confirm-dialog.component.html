@if (isOpen()) {
  <div class="dialog-backdrop" (click)="onCancel()" aria-hidden="true"></div>
  <div
    #dialogEl
    class="dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'dialog-title'"
    tabindex="-1"
    (keydown)="onKeydown($event)"
  >
    <h2 id="dialog-title" class="dialog__title">{{ title() }}</h2>
    <p class="dialog__message">{{ message() }}</p>
    <div class="dialog__actions">
      <button class="btn btn-secondary" (click)="onCancel()">{{ cancelLabel() }}</button>
      <button class="btn btn-danger" (click)="onConfirm()">{{ confirmLabel() }}</button>
    </div>
  </div>
}
