<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1 class="auth-card__title">Forgot password?</h1>
      <p class="auth-card__subtitle">Enter your email and we'll send you a reset link.</p>
    </div>

    @if (sent()) {
      <div class="alert alert--success" role="status" aria-live="polite">
        If that email exists in our system, a reset link has been sent.
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label class="form-label" for="fp-email">Email address</label>
          <input id="fp-email" type="email" class="form-control"
            [class.is-invalid]="emailCtrl.invalid && emailCtrl.touched"
            formControlName="email" autocomplete="email" aria-required="true"
            [attr.aria-describedby]="emailCtrl.invalid && emailCtrl.touched ? 'fp-email-error' : null" />
          @if (emailCtrl.invalid && emailCtrl.touched) {
            <span id="fp-email-error" class="form-error" role="alert">Please enter a valid email address.</span>
          }
        </div>
        <button type="submit" class="btn btn-primary auth-card__submit" [disabled]="loading()">
          @if (loading()) {
            <app-loading-spinner size="sm" />
          } @else {
            Send Reset Link
          }
        </button>
      </form>
    }

    <p class="auth-card__footer">
      <a routerLink="/auth/login" class="auth-link">Back to sign in</a>
    </p>
  </div>
</div>
